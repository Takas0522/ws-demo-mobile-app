# ======================================
# Mobile BFF Application Configuration
# ======================================
# Version: 1.0
# Date: 2025-01-08
# ======================================

spring:
  application:
    name: mobile-bff
  
  # Jackson設定
  jackson:
    time-zone: Asia/Tokyo
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    serialization:
      write-dates-as-timestamps: false

# サーバー設定
server:
  port: ${MOBILE_BFF_PORT:8081}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Actuator設定
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Web API接続設定
webapi:
  base-url: ${WEB_API_URL:http://localhost:8080}
  timeout:
    connect: 5000
    read: 30000

# ログ設定
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.example.mobilebff: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
