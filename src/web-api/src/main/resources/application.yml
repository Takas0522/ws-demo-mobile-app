# ======================================
# Web API Application Configuration
# ======================================
# Version: 1.0
# Date: 2025-01-08
# ======================================

spring:
  application:
    name: web-api

  # データソース設定 (SQLite)
  datasource:
    url: jdbc:sqlite:${DB_PATH:./data/mobile_app.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      connection-timeout: 30000

  # JPA設定
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Tokyo

  # Jackson設定
  jackson:
    time-zone: Asia/Tokyo
    date-format: yyyy-MM-dd'T'HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
      write-dates-with-zone-id: false
    deserialization:
      adjust-dates-to-context-time-zone: false

# サーバー設定
server:
  port: ${WEB_API_PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Actuator設定
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# JWT設定
jwt:
  secret: ${JWT_SECRET:your-secret-key-here-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration-hours: ${JWT_EXPIRATION_HOURS:24}

# ログ設定
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.example.webapi: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
